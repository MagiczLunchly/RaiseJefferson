<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Pet Life</title>
  <style>
    body {
      font-family: sans-serif;
      background:#111;
      color:white;
      text-align:center;
    }

    #petWrapper {
      position:relative;
      width:256px;   /* adjust if you want bigger/smaller */
      height:256px;
      margin:20px auto;
    }

    #baseSprite,
    .overlay {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
    }

    /* Wider diaper, higher on torso */
    #diaperOverlay {
      position:absolute;
      width:110%;    /* wider than the body */
      left:-5%;      /* recenter after making wider */
      top:40%;       /* higher toward torso */
    }

    /* Beard high on the face (adult + old) */
    #beardOverlay {
      position:absolute;
      width:35%;     /* slightly narrower */
      left:32%;      /* horizontal position */
      top:110%;       /* much higher so it reaches face */
    }

    #controls {
      margin-top:40px; /* pushes buttons further down */
    }

    button {
      margin:5px;
      padding:8px 12px;
      cursor:pointer;
    }
  </style>
</head>
<body>
  <h1>Pet Life</h1>

  <div id="status"></div>

  <div id="petWrapper">
    <!-- base sprite -->
    <img id="baseSprite"
         src="https://i.ibb.co/nNqGSWWN/IMG-2528.png"
         alt="pet" />

    <!-- baby diaper overlay -->
    <img id="diaperOverlay" class="overlay"
         src="https://png.pngtree.com/png-vector/20231214/ourmid/pngtree-diapers-flat-style-cartoon-free-buckle-hand-drawn-daily-necessities-png-image_11338185.png"
         style="display:none;" />

    <!-- beard overlay (adult + old) -->
    <img id="beardOverlay" class="overlay"
         src="https://www.freepnglogos.com/uploads/beard-png/mustache-brown-beard-transparent-png-stickpng-1.png"
         style="display:none;" />
  </div>

  <div id="controls">
    <button id="ageBtn">Age Up</button>
    <button id="resetBtn">Hard Reset</button>
  </div>

  <script>
    // Save key and stages
    const SAVE_KEY = 'petSave';
    const stages = ['baby', 'teen', 'adult', 'old', 'dead'];

    function loadState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return { stage: 'baby', isDead: false };
      try {
        const data = JSON.parse(raw);
        if (!stages.includes(data.stage)) throw new Error();
        return data;
      } catch {
        return { stage: 'baby', isDead: false };
      }
    }

    function saveState(state) {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    }

    let state = loadState();

    const statusEl      = document.getElementById('status');
    const diaperOverlay = document.getElementById('diaperOverlay');
    const beardOverlay  = document.getElementById('beardOverlay');
    const ageBtn        = document.getElementById('ageBtn');
    const resetBtn      = document.getElementById('resetBtn');

    function updateView() {
      // hide all overlays first
      diaperOverlay.style.display = 'none';
      beardOverlay.style.display  = 'none';

      // overlay rules:
      // baby  -> diaper
      // teen  -> nothing
      // adult -> beard
      // old   -> beard
      // dead  -> nothing
      if (state.stage === 'baby') {
        diaperOverlay.style.display = 'block';
      } else if (state.stage === 'adult' || state.stage === 'old') {
        beardOverlay.style.display = 'block';
      }

      statusEl.textContent = `Stage: ${state.stage.toUpperCase()}`;
      if (state.isDead) {
        statusEl.textContent += ' (PERMANENTLY DEAD)';
        ageBtn.disabled = true;
      } else {
        ageBtn.disabled = false;
      }
    }

    function ageUp() {
      if (state.isDead) return;

      const idx = stages.indexOf(state.stage);
      if (idx < stages.length - 1) {
        state.stage = stages[idx + 1];
      }
      if (state.stage === 'dead') {
        state.isDead = true;
      }

      saveState(state);
      updateView();
    }

    ageBtn.addEventListener('click', ageUp);

    resetBtn.addEventListener('click', () => {
      if (!confirm('This will wipe your pet and start a new one. Continue?')) return;
      localStorage.removeItem(SAVE_KEY);
      state = { stage: 'baby', isDead: false };
      saveState(state);
      updateView();
    });

    // initial draw
    updateView();
  </script>
</body>
</html>
