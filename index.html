<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Raise a Jefferson</title>
  <style>
    body {
      font-family: sans-serif;
      background:#111;
      color:white;
      margin:0;
    }

    h1 {
      text-align:center;
      margin-top:10px;
    }

    #layout {
      display:flex;
      align-items:flex-start;
      justify-content:center;
      gap:40px;
      margin-top:20px;
    }

    #uiColumn {
      text-align:left;
      max-width:260px;
    }

    #petWrapper {
      position:relative;
      width:256px;
      height:256px;
    }

    #baseSprite,
    .overlay {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
    }

    #diaperOverlay {
      position:absolute;
      width:110%;
      left:-5%;
      top:40%;
    }

    #beardOverlay {
      position:absolute;
      width:35%;
      left:40%;
      top:0%;
    }

    #info {
      margin-top:10px;
      line-height:1.6;
    }

    #controls {
      margin-top:10px;
    }

    button {
      margin:5px 5px 0 0;
      padding:8px 12px;
      cursor:pointer;
    }

    #feedMeterBar {
      width:200px;
      height:20px;
      border:1px solid #fff;
      margin:5px 0;
      background:#333;
      position:relative;
    }
    #feedMeterFill {
      height:100%;
      background:#4caf50;
      width:100%;
    }

    #knowledgeMeterBar {
      width:200px;
      height:20px;
      border:1px solid #fff;
      margin:5px 0;
      background:#222;
      position:relative;
    }
    #knowledgeMeterFill {
      height:100%;
      background:#2196f3;
      width:0%;
    }

    #nextMonthTimer {
      position:fixed;
      top:8px;
      right:10px;
      font-size:14px;
      background:rgba(0,0,0,0.6);
      padding:6px 10px;
      border-radius:4px;
    }

    #schoolPromptOverlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.8);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }
    #schoolPromptBox {
      background:#222;
      border:1px solid #555;
      padding:20px;
      max-width:320px;
      text-align:center;
      box-shadow:0 0 10px #000;
    }
    #schoolPromptBox button {
      margin-top:10px;
    }

    #gamblingPanel {
      margin-top:15px;
      padding:10px;
      border:1px solid #444;
      background:#181818;
      display:none;
    }
    #gamblingPanel input {
      width:80px;
      padding:4px;
      margin-top:4px;
      margin-bottom:4px;
      background:#000;
      border:1px solid #555;
      color:white;
    }
    #gamblingMessage {
      margin-top:5px;
      min-height:18px;
      font-size:13px;
    }

    #restartBtn {
      display:none;
      padding:8px 12px;
      cursor:pointer;
      background:#8b0000;
      color:white;
      border:1px solid #ff4444;
      margin-top:10px;
    }
    #restartBtn:hover {
      background:#aa0000;
    }
  </style>
</head>
<body>
  <h1>Raise a Jefferson</h1>

  <div id="nextMonthTimer">Next month in: 10s</div>

  <div id="schoolPromptOverlay">
    <div id="schoolPromptBox">
      <div id="schoolPromptText">NEW YEAR🎉 — Send Jefferson to school this year?</div>
      <div style="margin-top:8px;">
        <button id="schoolYesBtn">Yes, send to school</button>
        <button id="schoolNoBtn">No</button>
      </div>
    </div>
  </div>

  <div id="layout">
    <div id="uiColumn">
      <div id="status"></div>

      <div id="info">
        <div id="ageDisplay">Age: 0 years</div>
        <div id="monthsDisplay">Months alive: 0</div>
        <div id="moneyDisplay">Money: $0</div>

        <div>Feed meter:</div>
        <div id="feedMeterBar"><div id="feedMeterFill"></div></div>
        <div id="feedText"></div>

        <div style="margin-top:8px;">Knowledge meter:</div>
        <div id="knowledgeMeterBar"><div id="knowledgeMeterFill"></div></div>
        <div id="knowledgeText"></div>
      </div>

      <div id="controls">
        <button id="feedBtn">Feed Jefferson (-$10)</button>
        <button id="upgradeBtn">Faster Years Upgrade (-$1000)</button>
        <button id="gamblingToggleBtn">Gambling (Unlocks at age 18)</button>
        <br>
        <button id="restartBtn">🔄 Restart Game</button>
      </div>

      <div id="gamblingPanel">
        <div><strong>Gambling</strong> (Hard to win, but possible)</div>
        <div>Bet amount:</div>
        <input type="number" id="gamblingBet" min="1" value="10" />
        <br />
        <button id="gambleBtn">Gamble!</button>
        <div id="gamblingMessage"></div>
      </div>
    </div>

    <div id="petWrapper">
      <img id="baseSprite" src="https://i.ibb.co/nNqGSWWN/IMG-2528.png" alt="Jefferson" />
      <img id="diaperOverlay" class="overlay"
           src="https://png.pngtree.com/png-vector/20231214/ourmid/pngtree-diapers-flat-style-cartoon-free-buckle-hand-drawn-daily-necessities-png-image_11338185.png"
           style="display:none;" />
      <img id="beardOverlay" class="overlay"
           src="https://www.freepnglogos.com/uploads/beard-png/mustache-brown-beard-transparent-png-stickpng-1.png"
           style="display:none;" />
    </div>
  </div>

  <script>
    const SAVE_KEY = 'petSave';

    const STAGE_BABY_MAX  = 10;
    const STAGE_TEEN_MAX  = 20;
    const STAGE_ADULT_MAX = 60;

    const BASE_MS_PER_MONTH = 10_000;
    const FAST_MS_PER_MONTH = 8_000;
    const MONTHS_PER_YEAR   = 12;

    const MAX_FEED_LEVEL          = 100;
    const BASE_FEED_AMOUNT        = 40;
    const UPGRADED_FEED_AMOUNT    = 45;
    const BASE_FEED_COST          = 10;
    const UPGRADED_FEED_COST      = 8;
    const FEED_DECAY_PER_MONTH    = 5;
    const MIN_SAFE_FEED_FOR_CHECK = 20;

    const MAX_KNOWLEDGE             = 100;
    const BASE_SCHOOL_COST          = 100;
    const UPGRADED_SCHOOL_COST      = 80;
    const KNOWLEDGE_GAIN_PER_SCHOOL = 10;
    const YEAR_UPGRADE_COST         = 1000;

    function freshState() {
      return { years:0, months:0, stage:'baby', isDead:false, money:0,
               feedLevel:MAX_FEED_LEVEL, knowledge:0, hasYearUpgrade:false };
    }

    function loadState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return freshState();
      try { return Object.assign(freshState(), JSON.parse(raw)); }
      catch { return freshState(); }
    }

    function saveState(s) { localStorage.setItem(SAVE_KEY, JSON.stringify(s)); }

    let state = loadState();

    const statusEl            = document.getElementById('status');
    const diaperOverlay       = document.getElementById('diaperOverlay');
    const beardOverlay        = document.getElementById('beardOverlay');
    const ageDisplay          = document.getElementById('ageDisplay');
    const monthsDisplay       = document.getElementById('monthsDisplay');
    const moneyDisplay        = document.getElementById('moneyDisplay');
    const feedMeterFill       = document.getElementById('feedMeterFill');
    const feedText            = document.getElementById('feedText');
    const feedBtn             = document.getElementById('feedBtn');
    const knowledgeMeterFill  = document.getElementById('knowledgeMeterFill');
    const knowledgeText       = document.getElementById('knowledgeText');
    const nextMonthTimerEl    = document.getElementById('nextMonthTimer');
    const schoolPromptOverlay = document.getElementById('schoolPromptOverlay');
    const schoolPromptText    = document.getElementById('schoolPromptText');
    const schoolYesBtn        = document.getElementById('schoolYesBtn');
    const schoolNoBtn         = document.getElementById('schoolNoBtn');
    const upgradeBtn          = document.getElementById('upgradeBtn');
    const gamblingToggleBtn   = document.getElementById('gamblingToggleBtn');
    const gamblingPanel       = document.getElementById('gamblingPanel');
    const gamblingBetInput    = document.getElementById('gamblingBet');
    const gamblingMessage     = document.getElementById('gamblingMessage');
    const gambleBtn           = document.getElementById('gambleBtn');
    const restartBtn          = document.getElementById('restartBtn');

    let waitingForSchoolChoice = false;
    let monthIntervalId        = null;
    let countdownIntervalId    = null;
    let currentMsPerMonth      = state.hasYearUpgrade ? FAST_MS_PER_MONTH : BASE_MS_PER_MONTH;
    let nextMonthRemainingMs   = currentMsPerMonth;

    function computeStage(y) {
      if (y < STAGE_BABY_MAX)  return 'baby';
      if (y < STAGE_TEEN_MAX)  return 'teen';
      if (y < STAGE_ADULT_MAX) return 'adult';
      return 'old';
    }

    function knowledgeMultiplier() { return 1 + (state.knowledge / MAX_KNOWLEDGE); }
    function currentFeedCost()   { return state.hasYearUpgrade ? UPGRADED_FEED_COST   : BASE_FEED_COST; }
    function currentFeedAmount() { return state.hasYearUpgrade ? UPGRADED_FEED_AMOUNT : BASE_FEED_AMOUNT; }
    function currentSchoolCost() { return state.hasYearUpgrade ? UPGRADED_SCHOOL_COST : BASE_SCHOOL_COST; }

    function updateView() {
      diaperOverlay.style.display = 'none';
      beardOverlay.style.display  = 'none';
      if (!state.isDead) {
        if (state.stage === 'baby') diaperOverlay.style.display = 'block';
        else if (state.stage === 'adult' || state.stage === 'old') beardOverlay.style.display = 'block';
      }

      statusEl.textContent = state.isDead
        ? 'Stage: DEAD (PERMANENTLY)'
        : `Stage: ${state.stage.toUpperCase()} — Raise a Jefferson`;

      ageDisplay.textContent    = `Age: ${state.years} years`;
      monthsDisplay.textContent = `Months alive: ${state.months}`;
      moneyDisplay.textContent  = `Money: $${state.money}`;

      const feedPct = (Math.max(0, Math.min(MAX_FEED_LEVEL, state.feedLevel)) / MAX_FEED_LEVEL) * 100;
      feedMeterFill.style.width = feedPct + '%';
      if      (state.feedLevel > 70) feedText.textContent = 'Well fed';
      else if (state.feedLevel > 40) feedText.textContent = 'Hungry';
      else if (state.feedLevel > 10) feedText.textContent = 'Very hungry';
      else                           feedText.textContent = 'Starving! Feed Jefferson soon or risk death.';

      feedBtn.textContent = `Feed Jefferson (-$${currentFeedCost()})`;
      feedBtn.disabled = state.isDead || state.money < currentFeedCost();

      const knowPct = (Math.max(0, Math.min(MAX_KNOWLEDGE, state.knowledge)) / MAX_KNOWLEDGE) * 100;
      knowledgeMeterFill.style.width = knowPct + '%';
      if      (state.knowledge === 0) knowledgeText.textContent = 'Knowledge: none';
      else if (state.knowledge < 30)  knowledgeText.textContent = 'Knowledge: low';
      else if (state.knowledge < 70)  knowledgeText.textContent = 'Knowledge: educated';
      else                            knowledgeText.textContent = 'Knowledge: very smart';

      upgradeBtn.style.display = (state.isDead || state.hasYearUpgrade) ? 'none' : 'inline-block';
      if (!state.isDead && !state.hasYearUpgrade) {
        upgradeBtn.disabled = state.money < YEAR_UPGRADE_COST;
        upgradeBtn.textContent = `Faster Years Upgrade (-$${YEAR_UPGRADE_COST})`;
      }

      const canGamble = !state.isDead && state.years >= 18;
      gamblingToggleBtn.disabled = !canGamble;
      if (!canGamble) gamblingPanel.style.display = 'none';

      // Restart button only visible when dead
      restartBtn.style.display = state.isDead ? 'inline-block' : 'none';
    }

    function monthIncomeBase(y) {
      if (y < 10) return 1; if (y < 20) return 2; if (y < 60) return 3; return 4;
    }
    function yearIncomeBase(y) {
      if (y < 10) return 10; if (y < 20) return 15; if (y < 60) return 20; return 25;
    }

    function maybePromptSchool(yr) {
      if (state.isDead || waitingForSchoolChoice) return;
      waitingForSchoolChoice = true;
      const cost = currentSchoolCost();
      schoolPromptText.textContent =
        `NEW YEAR🎉\n\nJefferson is now ${yr} years old.\nSend Jefferson to school this year for $${cost}?`;
      schoolPromptOverlay.style.display = 'flex';
    }

    function handleSchoolChoice(go) {
      if (!waitingForSchoolChoice) return;
      waitingForSchoolChoice = false;
      schoolPromptOverlay.style.display = 'none';
      if (go && !state.isDead) {
        const cost = currentSchoolCost();
        if (state.money >= cost) {
          state.money -= cost;
          state.knowledge = Math.min(MAX_KNOWLEDGE, state.knowledge + KNOWLEDGE_GAIN_PER_SCHOOL);
        }
      }
      saveState(state); updateView();
    }

    schoolYesBtn.addEventListener('click', () => handleSchoolChoice(true));
    schoolNoBtn.addEventListener('click',  () => handleSchoolChoice(false));

    function onMonthPassed() {
      if (state.isDead) return;
      state.months += 1;
      state.feedLevel = Math.max(0, state.feedLevel - FEED_DECAY_PER_MONTH);
      state.money += Math.round(monthIncomeBase(state.years) * knowledgeMultiplier());

      if (state.months >= MONTHS_PER_YEAR) {
        state.months -= MONTHS_PER_YEAR;
        state.years += 1;
        state.money += Math.round(yearIncomeBase(state.years) * knowledgeMultiplier());
        maybePromptSchool(state.years);
        if (state.years % 3 === 0 && state.feedLevel < MIN_SAFE_FEED_FOR_CHECK) {
          state.isDead = true;
          state.stage = 'dead';
        }
      }

      if (!state.isDead) state.stage = computeStage(state.years);
      saveState(state); updateView();
    }

    feedBtn.addEventListener('click', () => {
      if (state.isDead) return;
      const cost = currentFeedCost();
      if (state.money < cost) return;
      state.money -= cost;
      state.feedLevel = Math.min(MAX_FEED_LEVEL, state.feedLevel + currentFeedAmount());
      saveState(state); updateView();
    });

    upgradeBtn.addEventListener('click', () => {
      if (state.isDead || state.hasYearUpgrade || state.money < YEAR_UPGRADE_COST) return;
      state.money -= YEAR_UPGRADE_COST;
      state.hasYearUpgrade = true;
      currentMsPerMonth = FAST_MS_PER_MONTH;
      resetTimers(); saveState(state); updateView();
    });

    gamblingToggleBtn.addEventListener('click', () => {
      if (state.isDead || state.years < 18) return;
      gamblingPanel.style.display = gamblingPanel.style.display === 'block' ? 'none' : 'block';
      gamblingMessage.textContent = '';
    });

    gambleBtn.addEventListener('click', () => {
      if (state.isDead) { gamblingMessage.textContent = 'Jefferson is dead.'; return; }
      if (state.years < 18) { gamblingMessage.textContent = 'Must be 18 to gamble.'; return; }
      const bet = parseInt(gamblingBetInput.value, 10);
      if (isNaN(bet) || bet <= 0) { gamblingMessage.textContent = 'Enter a valid bet.'; return; }
      if (bet > state.money) { gamblingMessage.textContent = 'Not enough money.'; return; }
      state.money -= bet;
      if (Math.random() < 0.3) {
        state.money += bet * 2;
        gamblingMessage.textContent = `You WON! Jefferson earned $${bet * 2}.`;
      } else {
        gamblingMessage.textContent = `You lost $${bet}. Better luck next time.`;
      }
      saveState(state); updateView();
    });

    // Restart — only shown when dead
    restartBtn.addEventListener('click', () => {
      state = freshState();
      saveState(state);
      currentMsPerMonth = BASE_MS_PER_MONTH;
      waitingForSchoolChoice = false;
      schoolPromptOverlay.style.display = 'none';
      gamblingPanel.style.display = 'none';
      resetTimers();
      updateView();
    });

    function startTimers() {
      nextMonthRemainingMs = currentMsPerMonth;
      countdownIntervalId = setInterval(() => {
        if (!state.isDead) {
          nextMonthRemainingMs -= 1000;
          if (nextMonthRemainingMs <= 0) nextMonthRemainingMs = currentMsPerMonth;
          nextMonthTimerEl.textContent = `Next month in: ${Math.ceil(nextMonthRemainingMs / 1000)}s`;
        }
      }, 1000);
      monthIntervalId = setInterval(() => {
        if (!state.isDead) { onMonthPassed(); nextMonthRemainingMs = currentMsPerMonth; }
      }, currentMsPerMonth);
    }

    function resetTimers() {
      if (countdownIntervalId) clearInterval(countdownIntervalId);
      if (monthIntervalId) clearInterval(monthIntervalId);
      startTimers();
    }

    updateView();
    startTimers();
    nextMonthTimerEl.textContent = `Next month in: ${currentMsPerMonth / 1000}s`;
  </script>
</body>
</html>
