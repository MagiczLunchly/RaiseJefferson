<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>Raise a Jefferson</title>
  <style>
    body {
      font-family: sans-serif;
      background:#111;
      color:white;
      margin:0;
    }

    h1 {
      text-align:center;
      margin-top:10px;
    }

    /* Layout: UI left, Jefferson right */
    #layout {
      display:flex;
      align-items:flex-start;
      justify-content:center;
      gap:40px;
      margin-top:20px;
    }

    #uiColumn {
      text-align:left;
      max-width:260px;
    }

    #petWrapper {
      position:relative;
      width:256px;
      height:256px;
    }

    #baseSprite,
    .overlay {
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      object-fit:contain;
      pointer-events:none;
    }

    /* Wider diaper, higher on torso */
    #diaperOverlay {
      position:absolute;
      width:110%;
      left:-5%;
      top:40%;
    }

    /* Beard high on the face (adult + old), more to the right */
    #beardOverlay {
      position:absolute;
      width:35%;
      left:40%;
      top:0%;
    }

    #info {
      margin-top:10px;
      line-height:1.6;
    }

    #controls {
      margin-top:10px;
    }

    button {
      margin:5px 5px 0 0;
      padding:8px 12px;
      cursor:pointer;
    }

    /* feed meter bar */
    #feedMeterBar {
      width:200px;
      height:20px;
      border:1px solid #fff;
      margin:5px 0;
      background:#333;
      position:relative;
    }
    #feedMeterFill {
      height:100%;
      background:#4caf50;
      width:100%;
    }

    /* knowledge meter bar */
    #knowledgeMeterBar {
      width:200px;
      height:20px;
      border:1px solid #fff;
      margin:5px 0;
      background:#222;
      position:relative;
    }
    #knowledgeMeterFill {
      height:100%;
      background:#2196f3;
      width:0%;
    }

    /* top-right timer for next month */
    #nextMonthTimer {
      position:fixed;
      top:8px;
      right:10px;
      font-size:14px;
      background:rgba(0,0,0,0.6);
      padding:6px 10px;
      border-radius:4px;
    }

    /* full-screen school prompt */
    #schoolPromptOverlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.8);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }
    #schoolPromptBox {
      background:#222;
      border:1px solid #555;
      padding:20px;
      max-width:320px;
      text-align:center;
      box-shadow:0 0 10px #000;
    }
    #schoolPromptBox button {
      margin-top:10px;
    }
  </style>
</head>
<body>
  <h1>Raise a Jefferson</h1>

  <!-- Top-right countdown -->
  <div id="nextMonthTimer">Next month in: 10s</div>

  <!-- Yearly school prompt overlay -->
  <div id="schoolPromptOverlay">
    <div id="schoolPromptBox">
      <div id="schoolPromptText">
        Send Jefferson to school this year for $100?
      </div>
      <div style="margin-top:8px;">
        <button id="schoolYesBtn">Yes, send to school (-$100)</button>
        <button id="schoolNoBtn">No</button>
      </div>
    </div>
  </div>

  <div id="layout">
    <!-- LEFT: UI -->
    <div id="uiColumn">
      <div id="status"></div>

      <div id="info">
        <div id="ageDisplay">Age: 0 years</div>
        <div id="monthsDisplay">Months alive: 0</div>
        <div id="moneyDisplay">Money: $0</div>

        <div>Feed meter:</div>
        <div id="feedMeterBar">
          <div id="feedMeterFill"></div>
        </div>
        <div id="feedText"></div>

        <div style="margin-top:8px;">Knowledge meter:</div>
        <div id="knowledgeMeterBar">
          <div id="knowledgeMeterFill"></div>
        </div>
        <div id="knowledgeText"></div>
      </div>

      <div id="controls">
        <button id="feedBtn">Feed Jefferson (-$10)</button>
      </div>
    </div>

    <!-- RIGHT: JEFFERSON -->
    <div id="petWrapper">
      <!-- base sprite -->
      <img id="baseSprite"
           src="https://i.ibb.co/nNqGSWWN/IMG-2528.png"
           alt="Jefferson" />

      <!-- baby diaper overlay -->
      <img id="diaperOverlay" class="overlay"
           src="https://png.pngtree.com/png-vector/20231214/ourmid/pngtree-diapers-flat-style-cartoon-free-buckle-hand-drawn-daily-necessities-png-image_11338185.png"
           style="display:none;" />

      <!-- beard overlay (adult + old) -->
      <img id="beardOverlay" class="overlay"
           src="https://www.freepnglogos.com/uploads/beard-png/mustache-brown-beard-transparent-png-stickpng-1.png"
           style="display:none;" />
    </div>
  </div>

  <script>
    const SAVE_KEY = 'petSave';

    // Stage thresholds in years
    const STAGE_BABY_MAX  = 10;  // <10
    const STAGE_TEEN_MAX  = 20;  // <20
    const STAGE_ADULT_MAX = 60;  // <60

    // Time constants
    const MS_PER_MONTH = 10_000; // 10 seconds per month
    const MONTHS_PER_YEAR = 12;

    // Feed meter constants
    const MAX_FEED_LEVEL = 100;     // 0–100
    const FEED_AMOUNT    = 40;      // feed button adds this
    const FEED_DECAY_PER_MONTH = 5; // how much it drops every month
    const FEED_COST = 10;           // dollars per feed
    const MIN_SAFE_FEED_FOR_CHECK = 20; // if below at 3-year check → die

    // Knowledge constants
    const MAX_KNOWLEDGE = 100;
    const SCHOOL_COST   = 100;
    const KNOWLEDGE_GAIN_PER_SCHOOL = 10; // each year you send him adds this

    function loadState() {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) {
        return {
          years: 0,
          months: 0,
          stage: 'baby',
          isDead: false,
          money: 0,
          feedLevel: MAX_FEED_LEVEL,
          knowledge: 0
        };
      }
      try {
        const data = JSON.parse(raw);
        return Object.assign({
          years: 0,
          months: 0,
          stage: 'baby',
          isDead: false,
          money: 0,
          feedLevel: MAX_FEED_LEVEL,
          knowledge: 0
        }, data);
      } catch {
        return {
          years: 0,
          months: 0,
          stage: 'baby',
          isDead: false,
          money: 0,
          feedLevel: MAX_FEED_LEVEL,
          knowledge: 0
        };
      }
    }

    function saveState(state) {
      localStorage.setItem(SAVE_KEY, JSON.stringify(state));
    }

    let state = loadState();

    const statusEl      = document.getElementById('status');
    const diaperOverlay = document.getElementById('diaperOverlay');
    const beardOverlay  = document.getElementById('beardOverlay');

    const ageDisplay    = document.getElementById('ageDisplay');
    const monthsDisplay = document.getElementById('monthsDisplay');
    const moneyDisplay  = document.getElementById('moneyDisplay');

    const feedMeterFill = document.getElementById('feedMeterFill');
    const feedText      = document.getElementById('feedText');
    const feedBtn       = document.getElementById('feedBtn');

    const knowledgeMeterFill = document.getElementById('knowledgeMeterFill');
    const knowledgeText      = document.getElementById('knowledgeText');

    const nextMonthTimerEl   = document.getElementById('nextMonthTimer');

    const schoolPromptOverlay = document.getElementById('schoolPromptOverlay');
    const schoolYesBtn        = document.getElementById('schoolYesBtn');
    const schoolNoBtn         = document.getElementById('schoolNoBtn');

    let waitingForSchoolChoice = false;
    let pendingSchoolYear      = null;

    function computeStage(years) {
      if (years < STAGE_BABY_MAX) return 'baby';
      if (years < STAGE_TEEN_MAX) return 'teen';
      if (years < STAGE_ADULT_MAX) return 'adult';
      return 'old';
    }

    function knowledgeMultiplier() {
      // 0 knowledge = 1x, 100 knowledge = 2x
      return 1 + (state.knowledge / MAX_KNOWLEDGE);
    }

    function updateView() {
      // overlays
      diaperOverlay.style.display = 'none';
      beardOverlay.style.display  = 'none';

      if (!state.isDead) {
        if (state.stage === 'baby') {
          diaperOverlay.style.display = 'block';
        } else if (state.stage === 'adult' || state.stage === 'old') {
          beardOverlay.style.display = 'block';
        }
      }

      statusEl.textContent = state.isDead
        ? `Stage: DEAD (PERMANENTLY)`
        : `Stage: ${state.stage.toUpperCase()} — Raise a Jefferson`;

      ageDisplay.textContent    = `Age: ${state.years} years`;
      monthsDisplay.textContent = `Months alive: ${state.months}`;
      moneyDisplay.textContent  = `Money: $${state.money}`;

      // feed meter
      const clampedFeed = Math.max(0, Math.min(MAX_FEED_LEVEL, state.feedLevel));
      const feedPct = (clampedFeed / MAX_FEED_LEVEL) * 100;
      feedMeterFill.style.width = feedPct + '%';

      if (clampedFeed > 70) {
        feedText.textContent = 'Well fed';
      } else if (clampedFeed > 40) {
        feedText.textContent = 'Hungry';
      } else if (clampedFeed > 10) {
        feedText.textContent = 'Very hungry';
      } else {
        feedText.textContent = 'Starving! Feed Jefferson soon or risk death.';
      }

      feedBtn.disabled = state.isDead || state.money < FEED_COST;

      // knowledge meter
      const clampedKnow = Math.max(0, Math.min(MAX_KNOWLEDGE, state.knowledge));
      const knowPct = (clampedKnow / MAX_KNOWLEDGE) * 100;
      knowledgeMeterFill.style.width = knowPct + '%';

      if (clampedKnow === 0) {
        knowledgeText.textContent = 'Knowledge: none';
      } else if (clampedKnow < 30) {
        knowledgeText.textContent = 'Knowledge: low';
      } else if (clampedKnow < 70) {
        knowledgeText.textContent = 'Knowledge: educated';
      } else {
        knowledgeText.textContent = 'Knowledge: very smart';
      }
    }

    // Money scaling: now includes knowledge multiplier
    function monthIncomeBase(years) {
      if (years < 10) return 1;
      if (years < 20) return 2;
      if (years < 60) return 3;
      return 4;
    }

    function yearIncomeBase(years) {
      if (years < 10) return 10;
      if (years < 20) return 15;
      if (years < 60) return 20;
      return 25;
    }

    // Well taken care of at 3-year checks
    function isWellTakenCareOf(state) {
      return state.feedLevel >= MIN_SAFE_FEED_FOR_CHECK;
    }

    function maybePromptSchool(yearJustReached) {
      if (state.isDead) return;
      // only if not already waiting on a choice
      if (waitingForSchoolChoice) return;

      waitingForSchoolChoice = true;
      pendingSchoolYear = yearJustReached;

      const text = `Jefferson is now ${yearJustReached} years old.\n\nSend Jefferson to school this year for $${SCHOOL_COST}?`;
      document.getElementById('schoolPromptText').textContent = text;
      schoolPromptOverlay.style.display = 'flex';
    }

    function handleSchoolChoice(goToSchool) {
      if (!waitingForSchoolChoice) return;
      waitingForSchoolChoice = false;
      schoolPromptOverlay.style.display = 'none';

      if (goToSchool && !state.isDead) {
        if (state.money >= SCHOOL_COST) {
          state.money -= SCHOOL_COST;
          state.knowledge += KNOWLEDGE_GAIN_PER_SCHOOL;
          if (state.knowledge > MAX_KNOWLEDGE) {
            state.knowledge = MAX_KNOWLEDGE;
          }
        }
        // if not enough money, nothing happens
      }

      saveState(state);
      updateView();
    }

    schoolYesBtn.addEventListener('click', () => handleSchoolChoice(true));
    schoolNoBtn.addEventListener('click', () => handleSchoolChoice(false));

    function onMonthPassed() {
      if (state.isDead) return;

      state.months += 1;

      // Feed meter decays every month
      state.feedLevel -= FEED_DECAY_PER_MONTH;
      if (state.feedLevel < 0) state.feedLevel = 0;

      // Monthly income (base * knowledge)
      const monthBase = monthIncomeBase(state.years);
      state.money += Math.round(monthBase * knowledgeMultiplier());

      // Year rollover
      if (state.months >= MONTHS_PER_YEAR) {
        state.months -= MONTHS_PER_YEAR;
        state.years += 1;

        // Yearly income (base * knowledge)
        const yearBase = yearIncomeBase(state.years);
        state.money += Math.round(yearBase * knowledgeMultiplier());

        // Prompt school every year
        maybePromptSchool(state.years);

        // Every 3 years → care check
        if (state.years % 3 === 0) {
          if (!isWellTakenCareOf(state)) {
            state.isDead = true;
            state.stage = 'dead';
          }
        }
      }

      // Stage update
      if (!state.isDead) {
        state.stage = computeStage(state.years);
      }

      saveState(state);
      updateView();
    }

    function feedJefferson() {
      if (state.isDead) return;
      if (state.money < FEED_COST) return;

      state.money -= FEED_COST;
      state.feedLevel += FEED_AMOUNT;
      if (state.feedLevel > MAX_FEED_LEVEL) {
        state.feedLevel = MAX_FEED_LEVEL;
      }

      saveState(state);
      updateView();
    }

    feedBtn.addEventListener('click', feedJefferson);

    // --- Countdown to next month ---
    let nextMonthRemainingMs = MS_PER_MONTH;

    function updateNextMonthTimer(deltaMs) {
      if (state.isDead) {
        nextMonthTimerEl.textContent = 'Jefferson is dead';
        return;
      }
      nextMonthRemainingMs -= deltaMs;
      if (nextMonthRemainingMs <= 0) {
        nextMonthRemainingMs += MS_PER_MONTH;
      }
      const seconds = Math.ceil(nextMonthRemainingMs / 1000);
      nextMonthTimerEl.textContent = `Next month in: ${seconds}s`;
    }

    // 1s countdown tick
    setInterval(() => {
      if (!state.isDead) {
        updateNextMonthTimer(1000);
      }
    }, 1000);

    // Month tick
    setInterval(() => {
      if (!state.isDead) {
        onMonthPassed();
        nextMonthRemainingMs = MS_PER_MONTH;
      }
    }, MS_PER_MONTH);

    // Initial draw
    updateView();
    nextMonthTimerEl.textContent = `Next month in: ${MS_PER_MONTH / 1000}s`;
  </script>
</body>
</html>
